name: Motorline MConnect Share
description: Acesso ao portão MConnect por link de partilha. Sem login — cola o link e fica com comando completo.
version: "1.0.0"
slug: motorline_mconnect_share_addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: Painel e API para portão (acesso por partilha)
options:
  mqtt_enabled: false
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  mqtt_enabled: "bool?"
  mqtt_host: "str?"
  mqtt_port: "port?"
  mqtt_user: "str?"
  mqtt_password: "password?"
