name: Motorline MConnect
description: Proxy para API Motorline MConnect. Instala, inicia e configura no painel (login e código por email).
version: "1.5.3"
slug: motorline_mconnect
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: Painel e API local para o portão
options:
  mqtt_enabled: false
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  mqtt_enabled: "bool?"
  mqtt_host: "str?"
  mqtt_port: "port?"
  mqtt_user: "str?"
  mqtt_password: "password?"
