name: Motorline MConnect
description: Proxy para API Motorline MConnect com renovação automática de token e suporte a código por email no login (comando do portão).
version: "1.2.1"
slug: motorline_mconnect
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: API local para comandos do portão
options:
  email:
    description: Email da conta MConnect
    example: "user@example.com"
  password:
    description: Password da conta MConnect
    example: ""
  device_id:
    description: ID do dispositivo (portão) - ex. 66755146c8a511e8645bd710
    example: "66755146c8a511e8645bd710"
    required: true
schema:
  email: str
  password: str
  device_id: str
