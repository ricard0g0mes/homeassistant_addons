name: Motorline MConnect
description: Comandar o portão MConnect a partir do HA. Use o link de partilha (app MConnect) uma vez — sem login, sem email, sem códigos. O addon trata de tudo.
version: "1.0.0"
slug: motorline_mconnect_addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: Painel e API para portão (acesso por partilha)
options:
  mqtt_enabled: false
  mqtt_host: 127.0.0.1
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  mqtt_enabled: "bool?"
  mqtt_host: "str?"
  mqtt_port: "port?"
  mqtt_user: "str?"
  mqtt_password: "password?"
